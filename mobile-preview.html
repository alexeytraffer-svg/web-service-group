<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>WEB SERVICE GROUP — мобильный предпросмотр</title>
    <style>
      :root {
        color: #18181b;
        background: #e9e9e7;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 430px;
        min-height: 100vh;
        margin: 0;
        padding: 18px;
      }

      .preview-shell {
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .preview-toolbar {
        display: flex;
        width: 390px;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: #52525b;
        font-size: 13px;
      }

      .preview-nav {
        display: flex;
        gap: 6px;
      }

      .preview-nav a {
        border: 1px solid #d4d4d8;
        border-radius: 999px;
        background: #fff;
        color: #18181b;
        padding: 8px 12px;
        text-decoration: none;
      }

      .device-frame {
        width: 390px;
        height: 844px;
        overflow: hidden;
        border: 1px solid #d4d4d8;
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 18px 55px rgb(24 24 27 / 12%);
      }

      iframe {
        display: block;
        width: 390px;
        height: 844px;
        border: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <div class="preview-toolbar">
        <span>Мобильный экран · 390 × 844</span>
        <nav class="preview-nav" aria-label="Страницы предпросмотра">
          <a href="/" target="mobile-site">Главная</a>
          <a href="/career" target="mobile-site">Вакансии</a>
        </nav>
      </div>
      <div class="device-frame">
        <iframe
          name="mobile-site"
          src="/"
          title="Мобильная версия сайта WEB SERVICE GROUP"
        ></iframe>
      </div>
    </main>
  </body>
</html>
